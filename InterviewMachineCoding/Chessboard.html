<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            #board {
                display: grid;
                margin-top: 20px;
                width: fit-content;
            }

            .border {
                border: 1px solid;
            }

            .square {
                width: 100px;
                height: 100px;
            }

            .white {
                background-color: white;
                border: 1px solid white;
            }

            .black {
                background-color: black;
            }
        </style>
    </head>

    <body>
        <h2>Dynamic ChessBoard</h2>
        <input min="2" type="number" placeholder="Enter the value" id="size" />
        <button onclick="createBoard()">Generate</button>
        <div id="board"></div>

        <script>
            function createBoard() {
                const n=document.getElementById("size").value
                if (n<=0) {
                    alert("plese enter valid number")
                    return
                }
                const board=document.getElementById("board")
                board.innerHTML=''
                board.style.gridTemplateColumns=`repeat(${n},100px)`
                board.classList.add("border")

                for (let r=0;r<n;r++) {
                    for (let c=0;c<n;c++) {
                        const square=document.createElement("div")
                        square.classList.add("square")

                        if ((r+c)%2===0) {
                            square.classList.add("white")
                        } else {
                            square.classList.add("black")
                        }

                        board.appendChild(square)
                    }
                }
            }
        </script>
    </body>

</html>
